 * Layout breakpoints
 * $mobile: screen width below this value will use mobile styles
 * $desktop: screen width above this value will use desktop styles
 * Screen width between $mobile and $desktop width will use the tablet layout.
 * assuming mobile &lt; desktop
 */
.encrypted-content {
  display: flex;
  align-items: center;
  justify-content: center;
}
.encrypted-content .encryption-notice {
  /* background: color-mix(in srgb, var(--lightgray) 60%, var(--light));
  */
  border: 1px solid var(--lightgray);
  padding: 2rem 1.5rem 2rem;
  border-radius: 5px;
  max-width: 450px;
  width: 100%;
  text-align: center;
  box-shadow: 0 6px 36px rgba(0, 0, 0, 0.15);
  margin-top: 2rem;
  font-family: var(--bodyFont);
}
.encrypted-content .encryption-notice h3 {
  margin: 0 0 0.5rem 0;
  color: var(--dark);
  font-size: 1.3rem;
  font-weight: 600;
  font-family: var(--headerFont);
}
.encrypted-content .encryption-notice p {
  color: var(--darkgray);
  line-height: 1.5;
  font-size: 0.95rem;
  margin: 0;
  font-style: italic;
}
.encrypted-content .encryption-notice .decrypt-form {
  margin: 1rem 0 0 0;
  display: flex;
  flex-direction: column;
  gap: 1rem;
  align-items: center;
}
.encrypted-content .encryption-notice .decrypt-form .decrypt-password {
  width: 100%;
  box-sizing: border-box;
  padding: 0.75rem 1rem;
  border-radius: 5px;
  font-family: var(--bodyFont);
  font-size: 1rem;
  border: 1px solid var(--lightgray);
  color: var(--dark);
  transition: border-color 0.2s ease;
  -webkit-text-security: disc;
  text-security: disc;
  -moz-text-security: disc;
}
.encrypted-content .encryption-notice .decrypt-form .decrypt-password:focus {
  outline: none;
  border-color: var(--secondary);
  box-shadow: 0 0 0 2px color-mix(in srgb, var(--secondary) 20%, transparent);
}
@media all and ((max-width: 800px)) {
  .encrypted-content .encryption-notice .decrypt-form .decrypt-password {
    font-size: 16px;
  }
}
.encrypted-content .encryption-notice .decrypt-form .decrypt-button {
  background: var(--secondary);
  color: var(--light);
  border: none;
  border-radius: 5px;
  padding: 0.75rem 2rem;
  font-family: var(--bodyFont);
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  min-width: 120px;
}
.encrypted-content .encryption-notice .decrypt-form .decrypt-button:hover {
  background: color-mix(in srgb, var(--secondary) 90%, var(--dark));
  transform: translateY(-1px);
  box-shadow: 0 4px 12px color-mix(in srgb, var(--secondary) 30%, transparent);
}
.encrypted-content .encryption-notice .decrypt-form .decrypt-button:active {
  transform: translateY(0);
}
@media all and ((max-width: 800px)) {
  .encrypted-content .encryption-notice .decrypt-form .decrypt-button {
    font-size: 16px;
  }
}
.encrypted-content .encryption-notice .decrypt-loading {
  display: none;
  margin-top: 1rem;
  padding: 0.75rem 1rem;
  background: color-mix(in srgb, var(--secondary) 10%, var(--light));
  border: 1px solid color-mix(in srgb, var(--secondary) 30%, transparent);
  border-radius: 5px;
  color: var(--secondary);
  font-size: 0.9rem;
  text-align: center;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
}
.encrypted-content .encryption-notice .decrypt-loading .loading-spinner {
  width: 16px;
  height: 16px;
  border: 2px solid color-mix(in srgb, var(--secondary) 20%, transparent);
  border-top: 2px solid var(--secondary);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
.encrypted-content .encryption-notice .decrypt-error {
  display: none;
  margin-top: 1rem;
  padding: 0.75rem 1rem;
  background: color-mix(in srgb, #ef4444 10%, var(--light));
  border: 1px solid color-mix(in srgb, #ef4444 30%, transparent);
  border-radius: 5px;
  color: #dc2626;
  font-size: 0.9rem;
  text-align: center;
}
@media all and ((max-width: 800px)) {
  .encrypted-content .encryption-notice {
    padding: 1.5rem 1rem;
    margin: 1rem;
  }
}

.search-space .encrypted-content .encryption-notice .decrypt-form,
.popover .encrypted-content .encryption-notice .decrypt-form {
  display: none;
}
.search-space .encryption-notice,
.popover .encryption-notice {
  /*
  border: 0;
  padding: 0;
  */
  margin: 1rem 0;
}

.decrypted-content-wrapper {
  display: block;
  margin: 0;
  padding: 0;
}

.encryption-icon {
  font-size: 2.5rem;
  margin-bottom: 0.5rem;
  opacity: 0.7;
}

@keyframes spin {
  0% {
    transform: rotate(0deg);
  }
  100% {
    transform: rotate(360deg);
  }
}
